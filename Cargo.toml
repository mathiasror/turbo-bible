[workspace]
resolver = "3"
members = ["crates/turbo-bible-tui", "crates/turbo-bible-data"]

[workspace.package]
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mathiasror/turbo-bible"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.32", features = ["backup", "bundled", "limits"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
time = "0.3"
toml = "0.8"
