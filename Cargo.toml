[package]
name = "turbo-bible"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
arboard = "3"
clap = { version = "4", features = ["derive"] }
crossterm = "0.28"
etcetera = "0.8"
ratatui = "0.28"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = "1"
toml = "0.8"
