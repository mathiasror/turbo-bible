name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The toolchain is pinned by rust-toolchain.toml; we add rustfmt + clippy
      # which the default profile in that file already includes.
      - name: Install rust toolchain
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # The PTY-driven e2e tests in tests/e2e.rs skip themselves when
      # ~/.local/share/turbo-bible/bible.sqlite isn't present, so unit-only
      # invocation is fine in CI. If we ever want to run them, the importer
      # script needs to populate the DB in a CI step first.
      - name: cargo test
        run: cargo test --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
