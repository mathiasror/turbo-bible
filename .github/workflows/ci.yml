name: CI

on:
  # Docs/website/demo-only changes don't affect the Rust build, so skip
  # the whole workflow for them (paths-ignore fires only when *every*
  # changed file matches — a mixed PR that also touches Cargo.toml still
  # runs). `schedule` ignores path filters, so the weekly audit/deny
  # safety net below is unaffected. The website ships via pages.yml.
  push:
    branches: [main]
    paths-ignore: ['website/**', 'docs/**', 'demo/**', '**/*.md']
  pull_request:
    paths-ignore: ['website/**', 'docs/**', 'demo/**', '**/*.md']
  workflow_dispatch:
  # Weekly heartbeat so RustSec advisories landing mid-week get caught
  # before the next merge. Only the `audit` + `deny` jobs actually rely
  # on this; the `check` job is a no-op-on-cron pass-through.
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1
  # Scrollmapper checkout pinned to a specific SHA so schema drift
  # on their `master` branch can't break our build mid-week. The TUI's
  # include_bytes! sites need crates/turbo-bible-tui/assets/*.db.zst
  # to exist before the build runs, and those are gitignored. Bump
  # this SHA + the matching one in release.yml when refreshing.
  SCROLLMAPPER_REF: a228a19a29099a41c196c2a310cd93e50a390e30

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The generated assets only change when the scrollmapper ref, the
      # data-pipeline crate, the manifest source, or the lockfile change.
      # On a hit we skip both the (slow) scrollmapper clone and the
      # pipeline run below — the whole assets/ dir is restored intact, so
      # the cached manifest.json stays paired with the .db.zst it was
      # generated against (the pipeline isn't bit-deterministic, so they
      # must travel together).
      - name: Cache translation assets
        id: assets-cache
        uses: actions/cache@v5  # node24 runtime (v4 ran on the deprecated node20)
        with:
          path: crates/turbo-bible-tui/assets
          key: tb-assets-${{ env.SCROLLMAPPER_REF }}-${{ hashFiles('crates/turbo-bible-data/**/*.rs', 'crates/turbo-bible-data/Cargo.toml', 'data/manifest_source.toml', 'Cargo.lock') }}

      - name: Clone scrollmapper at pinned ref
        if: steps.assets-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: scrollmapper/bible_databases
          ref: ${{ env.SCROLLMAPPER_REF }}
          path: data/scrollmapper-checkout
          # The build only reads formats/json/*.json and
          # formats/sqlite/extras/cross_references_*.db; sparse-checkout
          # skips the bulk of this large data repo. `git rev-parse HEAD`
          # (recorded into each .db) still works — .git stays intact.
          sparse-checkout: |
            formats/json
            formats/sqlite/extras
          sparse-checkout-cone-mode: true

      # The toolchain is pinned by rust-toolchain.toml; we add rustfmt + clippy
      # which the default profile in that file already includes.
      - name: Install rust toolchain
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Bundle translations into TUI assets/
        if: steps.assets-cache.outputs.cache-hit != 'true'
        # build.rs reads assets/manifest.json; bundled.rs embeds only
        # en-kjv. Always copy the freshly-built manifest alongside the
        # .db.zst — the data pipeline isn't bit-deterministic across
        # machines, so the committed manifest.json's sha256 fields
        # won't match a CI-rebuilt en-kjv.db.zst.
        run: |
          cargo run -p turbo-bible-data --release -- build \
            --scrollmapper data/scrollmapper-checkout \
            --manifest data/manifest_source.toml
          cargo run -p turbo-bible-data --release -- compress
          mkdir -p crates/turbo-bible-tui/assets
          cp dist/translations/*.db.zst crates/turbo-bible-tui/assets/
          cp dist/translations/manifest.json crates/turbo-bible-tui/assets/

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

  msrv:
    name: msrv (rust-version)
    runs-on: ubuntu-latest
    # `rust-version` in the root Cargo.toml is the contract we publish to
    # crates.io / docs.rs; this job proves the workspace still *builds* on
    # exactly that floor so it can't silently drift upward. We `cargo check`,
    # not `test`: the goal is "does it compile on the MSRV", and a full
    # build+test (incl. the PTY e2e suite) on a second toolchain would roughly
    # double CI for no extra signal — `check` is enough and keeps it fast.
    env:
      # Deliberately NOT `-D warnings` (unlike the workflow-level default that
      # the `check` job inherits): an MSRV pass must gate on *compilation*, not
      # on lints/deprecations that newer std or deps emit when seen through an
      # older compiler. Promoting those to errors would make the MSRV job fail
      # for reasons unrelated to "does it build on the floor". The clippy gate
      # in `check` owns warning-cleanliness on the pinned stable toolchain.
      RUSTFLAGS: ''
    steps:
      - uses: actions/checkout@v6

      # The same asset staging the `check` job needs: the TUI's include_bytes!
      # sites read crates/turbo-bible-tui/assets/*.db.zst, which are gitignored,
      # so without these the build fails at macro-expansion before the compiler
      # ever exercises our code. Mirrors the cache + clone + bundle steps above
      # (separate job, same recipe — a shared composite action would be the
      # DRY win if a third consumer ever appears).
      - name: Cache translation assets
        id: assets-cache
        uses: actions/cache@v5  # node24 runtime (v4 ran on the deprecated node20)
        with:
          path: crates/turbo-bible-tui/assets
          key: tb-assets-${{ env.SCROLLMAPPER_REF }}-${{ hashFiles('crates/turbo-bible-data/**/*.rs', 'crates/turbo-bible-data/Cargo.toml', 'data/manifest_source.toml', 'Cargo.lock') }}

      - name: Clone scrollmapper at pinned ref
        if: steps.assets-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: scrollmapper/bible_databases
          ref: ${{ env.SCROLLMAPPER_REF }}
          path: data/scrollmapper-checkout
          sparse-checkout: |
            formats/json
            formats/sqlite/extras
          sparse-checkout-cone-mode: true

      - name: Read MSRV from Cargo.toml
        id: msrv
        # Single source of truth: parse `rust-version` out of the root
        # manifest so this job tracks a bump automatically and can never
        # silently disagree with what we publish.
        run: |
          ver=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "Detected MSRV: $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Install MSRV + stable toolchains
        # The data pipeline (built below to bundle assets) is plain stable Rust
        # with no MSRV constraint, so it rides the rust-toolchain.toml stable
        # default; the MSRV toolchain is selected explicitly via `cargo +<ver>`
        # in the check step.
        run: |
          rustup toolchain install ${{ steps.msrv.outputs.version }} --profile minimal
          rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Bundle translations into TUI assets/
        if: steps.assets-cache.outputs.cache-hit != 'true'
        run: |
          cargo run -p turbo-bible-data --release -- build \
            --scrollmapper data/scrollmapper-checkout \
            --manifest data/manifest_source.toml
          cargo run -p turbo-bible-data --release -- compress
          mkdir -p crates/turbo-bible-tui/assets
          cp dist/translations/*.db.zst crates/turbo-bible-tui/assets/
          cp dist/translations/manifest.json crates/turbo-bible-tui/assets/

      - name: cargo +MSRV check
        run: |
          cargo +${{ steps.msrv.outputs.version }} check \
            --workspace --all-features --all-targets

  audit:
    name: cargo audit
    # The `deny` job below already runs `check advisories` against the
    # same RustSec DB on every PR, so the standalone audit (which builds
    # cargo-audit from source, ~3 min) only earns its keep as the weekly
    # heartbeat + on-demand. Skip it on push/pull_request.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # actions-rust-lang/audit is the maintained composite successor to
      # rustsec/audit-check (whose latest tag, v2, is stuck on the deprecated
      # node20 runtime). Composite actions have no node runtime, so this whole
      # deprecation class can't recur here. Same `token` input; the `deny` job's
      # `check advisories` is the hard advisory gate on every PR — this weekly
      # run is belt-and-braces.
      #
      # createIssues: false keeps this a pure advisory gate (matching the old
      # rustsec/audit-check behavior). The successor otherwise defaults to
      # opening issues on main, which the read-only default workflow token
      # can't do — it fails silently but spams the log on an advisory week.
      - uses: actions-rust-lang/audit@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          createIssues: false

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # `bans` and `sources` catch supply-chain drift the audit job
          # can't see (duplicate-version sprawl, unexpected git deps,
          # unallowed licenses on a new transitive). `advisories` is
          # belt-and-braces alongside `audit` above.
          command: check advisories bans licenses sources
