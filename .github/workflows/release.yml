name: Release

# Tag-driven release. Push a `v*` tag to fire the workflow:
#   git tag v0.1.0 && git push --tags
#
# Builds prebuilt binaries for five targets, packages each as a tarball
# (.zip on Windows), uploads them as GitHub release assets, and publishes
# `turbo-bible` to crates.io. The hand-authored `website/install.sh`
# fetches whichever tarball matches the user's platform from the
# `latest` release.
#
# Migrating to cargo-dist later: run `cargo dist init`, copy the
# `bundle` step from the matrix job below into `dist-workspace.toml`
# under `github-build-setup`, and delete this file. See the
# "Cutting a release" section in CONTRIBUTING.md.

on:
  # Tag-driven release. The matching `workflow_dispatch` knob used to
  # take a `tag` input but every job consumed `github.ref_name` (which
  # for dispatch is the *branch*, not the input) — silently mis-publishing.
  # Removed: push `git tag vX && git push --tags` to cut a release.
  push:
    tags: ['v*']

# Serialize per-tag so re-pushing the same tag (e.g. tag fix) doesn't
# race two concurrent runs trying to create the same release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default permissions are read-only; jobs that need to write to the
# GitHub release opt in below. `publish-crate` doesn't write to the
# release, only to crates.io via CARGO_REGISTRY_TOKEN.

env:
  # Scrollmapper checkout pinned to a specific SHA so the release is
  # reproducible. Bump this + the matching SHA in ci.yml when you want
  # to refresh the bundled translations. Data pipeline reads from
  # `data/scrollmapper-checkout/`.
  SCROLLMAPPER_REF: a228a19a29099a41c196c2a310cd93e50a390e30

jobs:
  build:
    name: build / ${{ matrix.target }}
    permissions:
      contents: write   # Upload release assets.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone scrollmapper at pinned ref
        uses: actions/checkout@v4
        with:
          repository: scrollmapper/bible_databases
          ref: ${{ env.SCROLLMAPPER_REF }}
          path: data/scrollmapper-checkout

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Bundle translations into TUI assets/
        shell: bash
        # build.rs reads assets/manifest.json; bundled.rs embeds only
        # en-kjv. The other translations + xrefs are uploaded as
        # individual release assets below for the binary to fetch.
        run: |
          cargo run -p turbo-bible-data --release -- build \
            --scrollmapper data/scrollmapper-checkout \
            --manifest data/manifest_source.toml
          cargo run -p turbo-bible-data --release -- compress
          mkdir -p crates/turbo-bible-tui/assets
          cp dist/translations/en-kjv.db.zst crates/turbo-bible-tui/assets/
          cp dist/translations/manifest.json crates/turbo-bible-tui/assets/

      - name: Install cross (linux-arm64 only)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p turbo-bible --release --target ${{ matrix.target }}
          else
            cargo build -p turbo-bible --release --target ${{ matrix.target }}
          fi

      - name: Package tarball
        shell: bash
        # Asset name is tag-less so `releases/latest/download/<name>` works.
        # The release page still shows the tag.
        run: |
          name="turbo-bible-${{ matrix.target }}"
          mkdir -p "dist-pkg/$name"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/turbo-bible.exe" "dist-pkg/$name/"
            cp README.md LICENSE-MIT LICENSE-APACHE "dist-pkg/$name/" 2>/dev/null || true
            (cd dist-pkg && 7z a "$name.zip" "$name")
          else
            cp "target/${{ matrix.target }}/release/turbo-bible" "dist-pkg/$name/"
            cp README.md LICENSE-MIT LICENSE-APACHE "dist-pkg/$name/" 2>/dev/null || true
            (cd dist-pkg && tar -czf "$name.tar.gz" "$name")
          fi

      - name: Compute SHA256 sidecar
        shell: bash
        # install.sh fetches `<asset>.sha256` and verifies before extract.
        # Linux runners have sha256sum; macOS has shasum -a 256; Windows
        # runners (bash via Git Bash) ship sha256sum via msys.
        run: |
          cd dist-pkg
          name="turbo-bible-${{ matrix.target }}.${{ matrix.ext }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name" > "$name.sha256"
          else
            shasum -a 256 "$name" > "$name.sha256"
          fi

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-pkg/*.${{ matrix.ext }}
            dist-pkg/*.sha256
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  upload-translations:
    name: upload translations + xrefs assets
    # Run after `build` so we don't race against the matrix on
    # `softprops/action-gh-release@v2`'s "create release if missing"
    # path. The first job into a tag wins the create; later ones must
    # observe an existing release to append to.
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone scrollmapper at pinned ref
        uses: actions/checkout@v4
        with:
          repository: scrollmapper/bible_databases
          ref: ${{ env.SCROLLMAPPER_REF }}
          path: data/scrollmapper-checkout

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: translations-assets

      # Each <code>.db.zst (and xrefs.db.zst) lands as an individual
      # release asset so the binary's fetch::translation can grab
      # exactly the one it needs from
      # `releases/v<tag>/download/<code>.db.zst`.
      # translations.tar.gz bundles all 12 for install.sh to
      # pre-fetch in one HTTP request, keeping the curl-install
      # experience offline-from-the-jump.
      - name: Build translation assets
        run: |
          cargo run -p turbo-bible-data --release -- build \
            --scrollmapper data/scrollmapper-checkout \
            --manifest data/manifest_source.toml
          cargo run -p turbo-bible-data --release -- compress
          (cd dist/translations && tar -czf ../translations.tar.gz *.db.zst manifest.json)

      - name: Compute SHA256 sidecar for translations bundle
        # The binary's `fetch.rs::ct_eq` already verifies per-translation
        # sha256s against the embedded manifest on demand. The bundle's
        # own sha256 is for install.sh's pre-stage path, which bypasses
        # fetch.rs and so needs its own integrity check.
        run: |
          cd dist
          sha256sum translations.tar.gz > translations.tar.gz.sha256

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/translations/*.db.zst
            dist/translations/manifest.json
            dist/translations.tar.gz
            dist/translations.tar.gz.sha256
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  publish-crate:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone scrollmapper at pinned ref
        uses: actions/checkout@v4
        with:
          repository: scrollmapper/bible_databases
          ref: ${{ env.SCROLLMAPPER_REF }}
          path: data/scrollmapper-checkout

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish

      - name: Bundle translations
        run: |
          cargo run -p turbo-bible-data --release -- build \
            --scrollmapper data/scrollmapper-checkout \
            --manifest data/manifest_source.toml
          cargo run -p turbo-bible-data --release -- compress
          mkdir -p crates/turbo-bible-tui/assets
          cp dist/translations/en-kjv.db.zst crates/turbo-bible-tui/assets/
          cp dist/translations/manifest.json crates/turbo-bible-tui/assets/

      - name: Copy license files into crate dir
        # crates.io tarball claims "MIT OR Apache-2.0" in metadata but
        # the LICENSE files live two directories up at workspace root.
        # Copy them in so the published tarball is self-contained for
        # downstreams that need to reproduce the license notices.
        # `include = [...]` in Cargo.toml whitelists them for cargo
        # package; this step makes the files exist at publish time.
        run: cp LICENSE-MIT LICENSE-APACHE NOTICE crates/turbo-bible-tui/

      - name: cargo publish (turbo-bible)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p turbo-bible --allow-dirty
