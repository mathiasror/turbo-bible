name: Release

# Tag-driven release. Push a `v*` tag to fire the workflow:
#   git tag v0.1.0 && git push --tags
#
# Builds prebuilt binaries for four targets, packages each as a tarball
# (.zip on Windows), uploads them as GitHub release assets, and publishes
# `turbo-bible` to crates.io. The hand-authored `website/install.sh`
# fetches whichever tarball matches the user's platform from the
# `latest` release.
#
# Migrating to cargo-dist later: run `cargo dist init`, copy the
# `bundle` step from the matrix job below into `dist-workspace.toml`
# under `github-build-setup`, and delete this file. See the
# "Cutting a release" section in CONTRIBUTING.md.

on:
  # Tag-driven release. The matching `workflow_dispatch` knob used to
  # take a `tag` input but every job consumed `github.ref_name` (which
  # for dispatch is the *branch*, not the input) — silently mis-publishing.
  # Removed: push `git tag vX && git push --tags` to cut a release.
  push:
    tags: ['v*']

# Serialize per-tag so re-pushing the same tag (e.g. tag fix) doesn't
# race two concurrent runs trying to create the same release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default permissions are read-only; jobs that need to write to the
# GitHub release opt in below. `publish-crate` doesn't write to the
# release, only to crates.io via CARGO_REGISTRY_TOKEN.

env:
  # Scrollmapper checkout pinned to a specific SHA so the release is
  # reproducible. Bump this + the matching SHA in ci.yml when you want
  # to refresh the bundled translations. Data pipeline reads from
  # `data/scrollmapper-checkout/`.
  SCROLLMAPPER_REF: a228a19a29099a41c196c2a310cd93e50a390e30

jobs:
  # Build the translation assets exactly once and hand them to the
  # downstream jobs as an artifact. Previously every job (5 build matrix
  # legs + upload-translations + publish-crate) re-cloned the large
  # scrollmapper repo and re-ran the pipeline — ~7× the work for a
  # deterministic, ref-pinned output.
  prepare-assets:
    name: build translation assets (once)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone scrollmapper at pinned ref
        uses: actions/checkout@v6
        with:
          repository: scrollmapper/bible_databases
          ref: ${{ env.SCROLLMAPPER_REF }}
          path: data/scrollmapper-checkout
          # Only formats/json/*.json + formats/sqlite/extras/*.db are read
          # by the pipeline; sparse-checkout skips the rest of the repo.
          sparse-checkout: |
            formats/json
            formats/sqlite/extras
          sparse-checkout-cone-mode: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: prepare-assets

      - name: Build + compress all translations
        run: |
          cargo run -p turbo-bible-data --release -- build \
            --scrollmapper data/scrollmapper-checkout \
            --manifest data/manifest_source.toml
          cargo run -p turbo-bible-data --release -- compress

      - name: Upload translations artifact
        uses: actions/upload-artifact@v7
        with:
          name: translations
          path: dist/translations
          if-no-files-found: error

  build:
    name: build / ${{ matrix.target }}
    needs: prepare-assets
    permissions:
      contents: write   # Upload release assets.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            cross: true
          # No x86_64-apple-darwin leg: GitHub retired the `macos-13`
          # Intel runner image (Dec 2025) and is sunsetting Intel macOS
          # entirely by Fall 2027, so we ship Apple Silicon only. Intel
          # Mac users build from source (`cargo install turbo-bible`);
          # install.sh guards the x86_64-darwin combo with that hint.
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Download translations artifact
        uses: actions/download-artifact@v8
        with:
          name: translations
          path: dist/translations

      - name: Stage TUI assets/
        shell: bash
        # build.rs reads assets/manifest.json; bundled.rs embeds only
        # en-kjv. The other translations + xrefs are uploaded as
        # individual release assets (by upload-translations) for the
        # binary to fetch, so the binary only needs these two files.
        run: |
          mkdir -p crates/turbo-bible-tui/assets
          cp dist/translations/en-kjv.db.zst crates/turbo-bible-tui/assets/
          cp dist/translations/manifest.json crates/turbo-bible-tui/assets/

      - name: Install cross (linux-arm64 only)
        if: matrix.cross == true
        # Prebuilt binary — `cargo install cross` builds it from source.
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p turbo-bible --release --target ${{ matrix.target }}
          else
            cargo build -p turbo-bible --release --target ${{ matrix.target }}
          fi

      - name: Package tarball
        shell: bash
        # Asset name is tag-less so `releases/latest/download/<name>` works.
        # The release page still shows the tag.
        run: |
          name="turbo-bible-${{ matrix.target }}"
          mkdir -p "dist-pkg/$name"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/turbo-bible.exe" "dist-pkg/$name/"
            cp README.md LICENSE-MIT LICENSE-APACHE "dist-pkg/$name/" 2>/dev/null || true
            (cd dist-pkg && 7z a "$name.zip" "$name")
          else
            cp "target/${{ matrix.target }}/release/turbo-bible" "dist-pkg/$name/"
            cp README.md LICENSE-MIT LICENSE-APACHE "dist-pkg/$name/" 2>/dev/null || true
            (cd dist-pkg && tar -czf "$name.tar.gz" "$name")
          fi

      - name: Compute SHA256 sidecar
        shell: bash
        # install.sh fetches `<asset>.sha256` and verifies before extract.
        # Linux runners have sha256sum; macOS has shasum -a 256; Windows
        # runners (bash via Git Bash) ship sha256sum via msys.
        run: |
          cd dist-pkg
          name="turbo-bible-${{ matrix.target }}.${{ matrix.ext }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name" > "$name.sha256"
          else
            shasum -a 256 "$name" > "$name.sha256"
          fi

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist-pkg/*.${{ matrix.ext }}
            dist-pkg/*.sha256
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  upload-translations:
    name: upload translations + xrefs assets
    # Run after `build` so we don't race against the matrix on
    # `softprops/action-gh-release@v3`'s "create release if missing"
    # path. The first job into a tag wins the create; later ones must
    # observe an existing release to append to.
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download translations artifact
        uses: actions/download-artifact@v8
        with:
          name: translations
          path: dist/translations

      # Each <code>.db.zst (and xrefs.db.zst) lands as an individual
      # release asset so the binary's fetch::translation can grab
      # exactly the one it needs from
      # `releases/v<tag>/download/<code>.db.zst`.
      # translations.tar.gz bundles all 12 for install.sh to
      # pre-fetch in one HTTP request, keeping the curl-install
      # experience offline-from-the-jump.
      - name: Bundle translations tarball
        run: |
          (cd dist/translations && tar -czf ../translations.tar.gz *.db.zst manifest.json)

      - name: Compute SHA256 sidecar for translations bundle
        # The binary's `fetch.rs::ct_eq` already verifies per-translation
        # sha256s against the embedded manifest on demand. The bundle's
        # own sha256 is for install.sh's pre-stage path, which bypasses
        # fetch.rs and so needs its own integrity check.
        run: |
          cd dist
          sha256sum translations.tar.gz > translations.tar.gz.sha256

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/translations/*.db.zst
            dist/translations/manifest.json
            dist/translations.tar.gz
            dist/translations.tar.gz.sha256
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  publish-crate:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish

      - name: Download translations artifact
        uses: actions/download-artifact@v8
        with:
          name: translations
          path: dist/translations

      - name: Stage TUI assets/
        # build.rs reads assets/manifest.json; bundled.rs embeds en-kjv.
        # The crate's `include = [...]` whitelists these for the
        # published tarball, so they must exist at publish time.
        run: |
          mkdir -p crates/turbo-bible-tui/assets
          cp dist/translations/en-kjv.db.zst crates/turbo-bible-tui/assets/
          cp dist/translations/manifest.json crates/turbo-bible-tui/assets/

      - name: Copy license files into crate dir
        # crates.io tarball claims "MIT OR Apache-2.0" in metadata but
        # the LICENSE files live two directories up at workspace root.
        # Copy them in so the published tarball is self-contained for
        # downstreams that need to reproduce the license notices.
        # `include = [...]` in Cargo.toml whitelists them for cargo
        # package; this step makes the files exist at publish time.
        run: cp LICENSE-MIT LICENSE-APACHE NOTICE crates/turbo-bible-tui/

      - name: cargo publish (turbo-bible)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p turbo-bible --allow-dirty

  bump-homebrew-formula:
    name: bump Homebrew formula
    # Needs both the GitHub release assets (sha256 sidecars for the
    # prebuilt binaries) and the crates.io tarball (source-build sha
    # for Intel macOS). Re-runs on the same tag will fail at
    # `git switch -c bump-${TAG}` (branch exists); fix manually if it
    # happens.
    needs: [upload-translations, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - name: Bump formula in mathiasror/homebrew-turbo-bible
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
          TAG: ${{ github.ref_name }}     # e.g. v0.1.1
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          echo "::group::Fetch sha256 sidecars from release"
          work=$(mktemp -d)
          cd "$work"
          gh release download "$TAG" --repo mathiasror/turbo-bible \
            --pattern 'turbo-bible-*.tar.gz.sha256'
          SHA_MAC_ARM=$(awk '{print $1}' turbo-bible-aarch64-apple-darwin.tar.gz.sha256)
          SHA_LIN_ARM=$(awk '{print $1}' turbo-bible-aarch64-unknown-linux-gnu.tar.gz.sha256)
          SHA_LIN_X64=$(awk '{print $1}' turbo-bible-x86_64-unknown-linux-gnu.tar.gz.sha256)
          echo "macOS arm64:  $SHA_MAC_ARM"
          echo "Linux arm64:  $SHA_LIN_ARM"
          echo "Linux x86_64: $SHA_LIN_X64"
          echo "::endgroup::"

          echo "::group::Compute crates.io tarball sha256"
          SHA_CRATE=$(curl --retry 3 --retry-delay 5 -fsSL \
            "https://static.crates.io/crates/turbo-bible/turbo-bible-${VERSION}.crate" \
            | sha256sum | awk '{print $1}')
          echo "crates.io: $SHA_CRATE"
          echo "::endgroup::"

          echo "::group::Clone tap"
          cd "$work"
          gh repo clone mathiasror/homebrew-turbo-bible
          cd homebrew-turbo-bible
          git switch -c "bump-${TAG}"
          echo "::endgroup::"

          echo "::group::Rewrite Formula/turbo-bible.rb"
          VERSION="$VERSION" SHA_MAC_ARM="$SHA_MAC_ARM" SHA_LIN_ARM="$SHA_LIN_ARM" \
          SHA_LIN_X64="$SHA_LIN_X64" SHA_CRATE="$SHA_CRATE" \
          python3 <<'PY'
          import os, pathlib, re, sys

          p = pathlib.Path("Formula/turbo-bible.rb")
          s = p.read_text()
          VERSION = os.environ["VERSION"]

          def replace_once(pattern, repl, label):
              global s
              new, n = re.subn(pattern, repl, s, count=1, flags=re.M)
              if n != 1:
                  sys.exit(f"FAIL: {label} matched {n} times, expected 1")
              s = new

          # Each prebuilt-binary url + its following sha256 — anchored by
          # the target triple so the script is robust to formula reordering.
          for target, env_key in [
              ("aarch64-apple-darwin",      "SHA_MAC_ARM"),
              ("aarch64-unknown-linux-gnu", "SHA_LIN_ARM"),
              ("x86_64-unknown-linux-gnu",  "SHA_LIN_X64"),
          ]:
              replace_once(
                  rf'(url "https://github\.com/mathiasror/turbo-bible/releases/download/v)[^/]+(/turbo-bible-{re.escape(target)}\.tar\.gz"\s*\n\s*sha256 ")[a-f0-9]+(")',
                  rf'\g<1>{VERSION}\g<2>{os.environ[env_key]}\g<3>',
                  f"prebuilt {target}",
              )

          # crates.io source-build url + sha (Intel macOS fallback).
          replace_once(
              r'(url "https://static\.crates\.io/crates/turbo-bible/turbo-bible-)[^"]+(\.crate"\s*\n\s*sha256 ")[a-f0-9]+(")',
              rf'\g<1>{VERSION}\g<2>{os.environ["SHA_CRATE"]}\g<3>',
              "crates.io source",
          )

          p.write_text(s)
          PY

          ruby -c Formula/turbo-bible.rb
          echo "::endgroup::"

          echo "::group::Commit, push, and open PR"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "turbo-bible ${VERSION}

          Triggered by release ${TAG} in mathiasror/turbo-bible."
          git push -u origin "bump-${TAG}"
          gh pr create --fill --base main
          echo "::endgroup::"
