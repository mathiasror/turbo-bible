# cargo-deny policy. Run via `cargo deny check` locally (after
# `cargo install cargo-deny`); the same command runs in CI.
#
# Three things this catches that `cargo audit` alone doesn't:
#   1. License drift — a new dep with a license outside the allowlist
#      forces a deliberate review.
#   2. Duplicate-version sprawl — every entry in `bans.skip` below is
#      a known/accepted duplicate; anything else `--warn`s.
#   3. Unexpected sources — only crates.io is allow-listed, so a future
#      git/path/registry dep is flagged at review time.

[graph]
all-features = true

# ─────────────────────────── Advisories ────────────────────────────
# `cargo audit` is the primary gate (CI runs it separately, including
# on a weekly cron); `cargo deny check advisories` is a belt-and-braces
# duplicate that also covers yanked crates.
[advisories]
yanked = "deny"
ignore = []

# ───────────────────────────── Licenses ───────────────────────────
# Allowlist; anything outside this requires a deliberate addition.
[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # BSL-1.0 is OSI-approved and FSF-Free; arboard's Windows backend
    # (clipboard-win, error-code) uses it. Permissive, no copyleft.
    "BSL-1.0",
    # CDLA-Permissive-2.0 is the Linux Foundation's permissive data
    # license; webpki-roots distributes Mozilla's CA bundle under it.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

# ─────────────────────────────── Bans ─────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"

# Acceptable duplicates. With `multiple-versions = "warn"`, deny only flags a
# crate that has 2+ versions left *after* this list is applied — so skipping
# all-but-one major of a crate silences its warning while documenting why the
# spread exists. Re-evaluate when a dep bump collapses one.
skip = [
    # getrandom 0.3 (proptest, a dev-dep) coexists with 0.4 (tempfile); skip the
    # older so 0.4 survives alone.
    { name = "getrandom",  version = "0.3" },
]
# hashbrown previously spanned three majors and needed two skips; the rusqlite
# 0.40 / toml 1.x bumps collapsed it to a single version (hashlink, kasuari,
# indexmap now agree), so the skips were dropped.

# ─────────────────────────────── Sources ──────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
