[toolchain]
# Track latest stable rather than pin to MSRV. The MSRV gate lives in
# Cargo.toml's rust-version field (currently 1.95 — libsqlite3-sys's
# build.rs uses cfg_select!, stabilized in 1.95) and is enforced by the
# `msrv` CI job. Bumping `channel` to a specific version is the right
# move only once we hit a reproducibility issue.
channel = "stable"
components = ["rustfmt", "clippy"]
profile = "minimal"
