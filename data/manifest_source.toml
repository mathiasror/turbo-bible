# Curated translation slate. The legal paper trail: only translations
# listed here are ever built by `turbo-bible-data build`.
#
# Each license string is SPDX where one exists. For pre-1923 public-domain
# texts there is no clean SPDX identifier; we use `LicenseRef-PublicDomain`
# (an SPDX-conformant user-defined reference) and document the rationale
# in the per-entry notes below.
#
# `attribution` is the short string we surface in the in-app
# "About this translation" view. Required for CC-BY-family entries.

schema_version = 1

# ---------- English ----------

# KJV.json's wrapping metadata names the source "with Strongs Numbers and
# Morphology", under GPL — but the JSON export strips all Strongs/morphology
# fields and ships only the plain 1769 KJV verse text (verified by inspecting
# verse objects: only `verse` and `text` keys present). The verse text itself
# is unambiguously public domain (1769); the GPL claim attached only to the
# annotation overlay that the JSON export drops.
[[translation]]
code        = "en-kjv"
abbr        = "KJV"
language    = "en"
name        = "King James Version (1769)"
source_json = "formats/json/KJV.json"
license     = "LicenseRef-PublicDomain"
attribution = ""

