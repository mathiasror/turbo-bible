  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg:         #0000aa;\n    --bg-soft:    #1414b8;\n    --bg-dark:    #00007a;\n    --black:      #000000;\n    --grey:       #aaaaaa;\n    --grey-dim:   #a5a5d0;\n    --white:      #ffffff;\n    --yellow:     #ffff55;\n    --yellow-2:   #ffdd33;\n    --cyan:       #00aaaa;\n    --cyan-2:     #00d4d4;\n    --select:     #08a88a;\n    --select-2:   #0fbfa0;\n    --shadow:     rgba(0,0,0,.55);\n    --bar:        #c4c4c4;\n    --bar-dark:   #808080;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0;\n    padding: 0;\n    font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace;\n    font-size: 15px;\n    line-height: 1.55;\n    color: var(--white);\n    background: var(--black);\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  body {\n    min-height: 100vh;\n    /* CGA-style 50% dither on top of pure CGA blue */\n    background:\n      radial-gradient(circle at 20% -20%, rgba(255,255,255,.06), transparent 60%),\n      repeating-conic-gradient(from 0deg at 0 0, var(--bg) 0 25%, var(--bg-soft) 0 50%) 0 0 / 4px 4px,\n      var(--bg);\n  }\n  /* ---------- top + bottom chrome ---------- */\n  .titlebar {\n    position: sticky; top: 0; z-index: 10;\n    background: var(--bar);\n    color: var(--black);\n    height: 28px;\n    display: flex; align-items: center; justify-content: center;\n    font-weight: 700;\n    letter-spacing: .02em;\n    border-bottom: 1px solid var(--bar-dark);\n  }\n  .titlebar .dot { color: var(--bar-dark); padding: 0 .35em; }\n  .statusbar {\n    position: sticky; bottom: 0; z-index: 10;\n    background: var(--bar);\n    color: var(--black);\n    height: 28px;\n    display: flex; align-items: center; gap: 22px;\n    padding: 0 14px;\n    font-weight: 700;\n    border-top: 1px solid var(--bar-dark);\n  }\n  .statusbar .k { color: var(--black); }\n  .statusbar .k b { color: #aa0000; }\n  .statusbar .spacer { flex: 1; }\n  .statusbar .mode {\n    background: var(--select);\n    color: var(--white);\n    padding: 2px 12px;\n    font-weight: 700;\n  }\n  /* ---------- page layout ---------- */\n  main {\n    width: min(1360px, 100%);\n    margin: 0 auto;\n    padding: 22px 22px 60px;\n  }\n  /* ---------- TUI panels (double-line borders) ---------- */\n  .panel {\n    position: relative;\n    background: var(--bg);\n    color: var(--white);\n    margin: 22px 0;\n    /* outer \"double\" border + thin inner line via box-shadow */\n    border: 1px solid var(--white);\n    box-shadow:\n      inset 0 0 0 3px var(--bg),\n      inset 0 0 0 4px var(--white),\n      8px 8px 0 var(--shadow);\n    padding: 28px 32px 26px;\n  }\n  .panel > .title {\n    position: absolute;\n    top: -10px; left: 22px;\n    background: var(--bg);\n    padding: 0 10px;\n    color: var(--white);\n    font-weight: 700;\n    letter-spacing: .02em;\n  }\n  .panel > .title::before { content: \"┌─ \"; color: var(--white); }\n  .panel > .title::after  { content: \" ─\"; color: var(--white); }\n  .panel .right-tag {\n    position: absolute;\n    top: -10px; right: 22px;\n    background: var(--bg);\n    padding: 0 10px;\n    color: var(--cyan-2);\n  }\n\n  /* ---------- HERO ---------- */\n  .hero { padding: 38px 32px 30px; }\n  .hero-title {\n    font-family: 'Silkscreen', 'IBM Plex Mono', monospace;\n    font-weight: 700;\n    color: var(--yellow);\n    font-size: clamp(70px, 13vw, 184px);\n    line-height: .9;\n    letter-spacing: .02em;\n    text-align: center;\n    margin: 18px 0 6px;\n    /* stacked concentric outlines, like the splash screen */\n    text-shadow:\n       3px  0  0 var(--bg),  -3px  0  0 var(--bg),\n       0    3px 0 var(--bg),  0   -3px 0 var(--bg),\n       3px  3px 0 var(--bg), -3px -3px 0 var(--bg),\n       3px -3px 0 var(--bg), -3px  3px 0 var(--bg),\n       /* ring 1 */\n       7px  3px 0 var(--white), -7px  3px 0 var(--white),\n       7px -3px 0 var(--white), -7px -3px 0 var(--white),\n       3px  7px 0 var(--white), -3px  7px 0 var(--white),\n       3px -7px 0 var(--white), -3px -7px 0 var(--white),\n       /* gap */\n       7px  6px 0 var(--bg),   -7px  6px 0 var(--bg),\n       7px -6px 0 var(--bg),   -7px -6px 0 var(--bg),\n       6px  7px 0 var(--bg),   -6px  7px 0 var(--bg),\n       6px -7px 0 var(--bg),   -6px -7px 0 var(--bg),\n       /* ring 2 */\n      11px  6px 0 var(--white), -11px  6px 0 var(--white),\n      11px -6px 0 var(--white), -11px -6px 0 var(--white),\n       6px 11px 0 var(--white), -6px 11px 0 var(--white),\n       6px -11px 0 var(--white), -6px -11px 0 var(--white);\n  }\n  .hero-sub {\n    text-align: center;\n    color: var(--cyan-2);\n    font-size: 22px;\n    margin: 30px 0 8px;\n    letter-spacing: .04em;\n  }\n  .hero-sub .dot { color: var(--cyan); padding: 0 .5em; }\n  .hero-tag {\n    text-align: center;\n    color: var(--white);\n    margin: 26px 0 24px;\n    font-size: 16px;\n    max-width: 820px;\n    margin-left: auto; margin-right: auto;\n    text-wrap: pretty;\n  }\n  .hero-pills {\n    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;\n    margin-top: 8px;\n  }\n  .pill {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: var(--select);\n    color: var(--white);\n    font-weight: 700;\n    padding: 6px 14px;\n    letter-spacing: .04em;\n  }\n  .pill.yellow { background: var(--yellow); color: var(--black); }\n  .pill .caret { width: 9px; height: 16px; background: var(--white); display: inline-block; animation: blink 1.05s steps(1) infinite; }\n  @keyframes blink { 50% { opacity: 0; } }\n\n  /* ---------- install row ---------- */\n  .install {\n    margin: 36px auto 6px;\n    max-width: 760px;\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    align-items: center;\n    gap: 14px;\n  }\n  .install-label { color: var(--cyan-2); white-space: nowrap; font-weight: 700; }\n  .install-cmd {\n    background: var(--bg-dark);\n    border: 1px solid var(--white);\n    padding: 10px 14px;\n    color: var(--white);\n    font-weight: 500;\n    white-space: nowrap;\n    overflow: auto;\n  }\n  .install-cmd .sigil { color: var(--cyan-2); margin-right: .5em; }\n  .install-cmd .arg   { color: var(--yellow); }\n  .install-copy {\n    background: var(--yellow);\n    color: var(--black);\n    padding: 10px 16px;\n    border: 1px solid var(--white);\n    font-weight: 700;\n    cursor: pointer;\n    font-family: inherit;\n  }\n\n  /* ---------- section heading inside panels ---------- */\n  .section-h {\n    display: grid;\n    grid-template-columns: auto 1fr;\n    align-items: end;\n    gap: 12px;\n    margin-bottom: 18px;\n  }\n  .section-h h2 {\n    margin: 0;\n    color: var(--white);\n    font-size: 16px;\n    font-weight: 700;\n    letter-spacing: .04em;\n  }\n  .section-h .count { color: var(--cyan-2); font-weight: 700; }\n  .section-h .rule {\n    border-bottom: 1px solid var(--white);\n    height: 1px;\n    align-self: end;\n  }\n\n  /* ---------- feature grid (two columns, like Old/New Testament) ---------- */\n  .twocol {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 38px 56px;\n  }\n  @media (max-width: 900px) { .twocol { grid-template-columns: 1fr; } }\n\n  .feature-row {\n    display: grid;\n    grid-template-columns: 1.6em 1fr auto;\n    align-items: baseline;\n    column-gap: 10px;\n    padding: 4px 4px;\n    color: var(--white);\n  }\n  .feature-row.is-active {\n    background: var(--select);\n  }\n  .feature-row .arr { color: var(--white); }\n  .feature-row .name { font-weight: 700; }\n  .feature-row .short { color: var(--cyan-2); justify-self: end; }\n  .feature-row.muted .name { color: var(--grey-dim); font-weight: 500; }\n  .feature-row.muted .short { color: var(--grey-dim); }\n  .feature-row.is-active .short { color: var(--white otted var(--cyan-2); }\n  .final-cta .footnote a:hover { color: var(--yellow); border-bottom-color: var(--yellow); }\n  .final-cta .footnote .sep { color: var(--grey-dim); padding: 0 .4em; }\n\n  /* ---------- MOBILE ---------- */\n  @media (max-width: 720px) {\n    html, body { font-size: 14px; }\n    body {\n      /* conic-gradient tiling is heavy on mobile Safari; use a lighter pattern */\n      background:\n        repeating-linear-gradient(0deg, var(--bg) 0 2px, var(--bg-soft) 2px 4px),\n        var(--bg);\n    }\n    main { padding: 14px 12px 40px; }\n\n    /* Chrome bars: keep visible but scrollable, smaller type */\n    .titlebar {\n      font-size: 12px;\n      height: 26px;\n      padding: 0 10px;\n      white-space: nowrap;\n      overflow-x: auto;\n      justify-content: flex-start;\n      -webkit-overflow-scrolling: touch;\n    }\n    .statusbar {\n      height: 26px;\n      gap: 12px;\n      padding: 0 10px;\n      font-size: 12px;\n      white-space: nowrap;\n      overflow-x: auto;\n      -webkit-overflow-scrolling: touch;\n    }\n    .statusbar .mode { padding: 2px 8px; }\n    .statusbar .spacer { flex: 0 0 8px; }\n\n    /* Panels: trim padding, soften shadow */\n    .panel {\n      margin: 16px 0;\n      padding: 22px 16px 20px;\n      box-shadow:\n        inset 0 0 0 3px var(--bg),\n        inset 0 0 0 4px var(--white),\n        4px 4px 0 var(--shadow);\n    }\n    .panel > .title { left: 14px; font-size: 12px; }\n    .panel .right-tag { display: none; }\n\n    /* HERO: kill the overflowing concentric shadows, scale the type */\n    .hero { padding: 28px 14px 26px; }\n    .hero-title {\n      font-size: clamp(48px, 16vw, 84px);\n      line-height: .95;\n      letter-spacing: .01em;\n      /* simpler outline at mobile scale */\n      text-shadow:\n         2px 0 0 var(--bg), -2px 0 0 var(--bg),\n         0  2px 0 var(--bg),  0 -2px 0 var(--bg),\n         2px 2px 0 var(--bg),-2px-2px 0 var(--bg),\n         2px-2px 0 var(--bg),-2px 2px 0 var(--bg),\n         4px 2px 0 var(--white),-4px 2px 0 var(--white),\n         4px-2px 0 var(--white),-4px-2px 0 var(--white),\n         2px 4px 0 var(--white),-2px 4px 0 var(--white),\n         2px-4px 0 var(--white),-2px-4px 0 var(--white);\n    }\n    .hero-sub {\n      font-size: 14px;\n      margin: 22px 0 6px;\n      line-height: 1.6;\n    }\n    .hero-tag { font-size: 14px; margin: 18px auto 18px; padding: 0 4px; }\n    .hero-pills { gap: 10px; }\n    .pill { font-size: 13px; padding: 5px 10px; }\n\n    /* Install row: stack vertically */\n    .install {\n      grid-template-columns: 1fr;\n      gap: 8px;\n      margin-top: 22px;\n    }\n    .install-label { text-align: center; }\n    .install-cmd { white-space: normal; word-break: break-word; font-size: 13px; }\n    .install-copy { justify-self: stretch; width: 100%; }\n\n    /* Pitch */\n    .pitch { padding: 26px 16px 22px; }\n    .pitch h2 { font-size: 26px; line-height: 1.2; }\n    .pitch p.lead { font-size: 15px; line-height: 1.6; }\n\n    /* Showcase mini */\n    .showcase { padding: 22px 14px 22px; }\n    .showcase .mini { font-size: 13px; padding: 18px 14px 14px; }\n    .verse { grid-template-columns: 1.9em 1fr; gap: 2px 8px; }\n    .verse .t { line-height: 1.5; }\n\n    /* Tiles + docs single column */\n    .tiles { grid-template-columns: 1fr !important; gap: 16px; }\n    .tile { padding: 18px 18px 20px; box-shadow: 3px 3px 0 var(--shadow); }\n    .tile h3 { font-size: 17px; }\n    .tile p { font-size: 14px; }\n    .docs { grid-template-columns: 1fr !important; gap: 0; }\n    .doc-link {\n      grid-template-columns: auto 1fr;\n      font-size: 14px;\n      padding: 12px 4px;\n    }\n    .doc-link .desc {\n      grid-column: 2;\n      justify-self: start;\n      font-size: 12px;\n      margin-top: 2px;\n    }\n\n    .colophon { font-size: 12px; padding: 0 14px; }\n\n    /* Hint rows inside minis: wrap nicely */\n    .hint-row { font-size: 12px; gap: 10px 14px; }\n    .hint-row .stat { width: 100%; text-align: right; margin-left: 0; }\n\n    /* ---- Hero copy (current sections) ---- */\n    .hero-headline {\n      font-size: clamp(22px, 6vw, 28px);\n      margin: 18px auto 4px;\n      max-width: 22ch;\n      line-height: 1.2;\n    }\n    .hero-aside { font-size: 13px; margin: 0 auto 12px; }\n    .hero-secondary { gap: 16px; font-size: 13px; margin-top: 10px; }\n    .trust-strip {\n      font-size: 12px;\n      letter-spacing: .02em;\n      line-height: 1.7;\n      margin-top: 22px;\n      padding: 0 4px;\n    }\n    .trust-strip .label { display: block; margin: 0 0 6px; }\n\n    /* ---- Features grid ---- */\n    .features-grid { gap: 22px 0; }\n    .feat h3 { font-size: 17px; }\n    .feat p { font-size: 14px; line-height: 1.55; }\n    .feat .num { font-size: 12px; }\n\n    /* ---- Manifesto ---- */\n    .manifesto { padding: 28px 16px 26px; }\n    .manifesto .eyebrow { font-size: 11px; letter-spacing: .12em; margin-bottom: 10px; }\n    .manifesto h2 { font-size: 22px; line-height: 1.22; max-width: none; }\n    .manifesto p { font-size: 15px; line-height: 1.7; }\n\n    /* ---- Quick start ---- */\n    .steps { gap: 18px; }\n    .step h3 { font-size: 16px; }\n    .step .code { font-size: 13px; padding: 10px 12px; }\n    .section-h h2 { font-size: 16px; }\n\n    /* ---- FAQ ---- */\n    .faq-item { padding: 14px 2px; }\n    .faq-q { font-size: 15px; gap: 8px; }\n    .faq-a { font-size: 14px; margin-left: 22px; line-height: 1.6; }\n\n    /* ---- Final CTA ---- */\n    .final-cta { padding: 28px 16px 28px; }\n    .final-cta h2 { font-size: 28px; line-height: 1.15; }\n    .final-cta .sub { font-size: 13px; line-height: 1.55; }\n    .final-cta .install { grid-template-columns: 1fr; gap: 8px; }\n    .final-cta .footnote { font-size: 13px; line-height: 1.7; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ==================== TITLE BAR ==================== -->\n<div class=\"titlebar\" role=\"banner\">\n  <span style=\"color:var(--bar-dark)\">≡<\u002Fspan>&nbsp;&nbsp;Bible <span class=\"dot\">·<\u002Fspan> Edit <span class=\"dot\">·<\u002Fspan> Search <span class=\"dot\">·<\u002Fspan> Translation <span class=\"dot\">·<\u002Fspan> Heresy <span class=\"dot\">·<\u002Fspan> Help\n<\u002Fdiv>\n\n<main>\n\n  <!-- ==================== HERO ==================== -->\n  <section class=\"panel hero\" data-screen-label=\"01 Hero\">\n    <div class=\"title\">Turbo Bible<\u002Fdiv>\n    <span class=\"right-tag\">v0.1<\u002Fspan>\n\n    <h1 class=\"hero-title\">TURBO BIBLE<\u002Fh1>\n\n    <p class=\"hero-headline\">The Bible. <em>In your terminal.<\u002Fem><\u002Fp>\n    <p class=\"hero-aside\">// like god intended.<\u002Fp>\n\n    <p class=\"hero-tag\">\n      An offline, keyboard-driven Bible reader for people who'd rather not\n      leave their terminal. Vim keybindings, instant search, every\n      translation God didn't copyright, zero telemetry.\n    <\u002Fp>\n\n    <div class=\"install\">\n      <span class=\"install-label\">$ install<\u002Fspan>\n      <div class=\"install-cmd\"><span class=\"sigil\">$<\u002Fspan>curl -fsSL <span class=\"arg\">turbo.bible/install.sh<\u002Fspan> | sh<\u002Fdiv>\n      <button class=\"install-copy\" type=\"button\" onclick=\"(()=&gt;{navigator.clipboard&amp;&amp;navigator.clipboard.writeText('curl -fsSL turbo.bible/install.sh | sh');this.textContent='COPIED';setTimeout(()=&gt;this.textContent='[ COPY ]',900)})()\">[ COPY ]<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"hero-secondary\">\n      <a href=\"https://github.com/USERNAME/turbo-bible\">View on GitHub<\u002Fa>\n      <a href=\"https://turbo.bible/docs\">Read the docs<\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"trust-strip\">\n      <span class=\"label\">// 66 books per translation<\u002Fspan>\n      KJV <span class=\"sep\">·<\u002Fspan> ASV <span class=\"sep\">·<\u002Fspan> WEB <span class=\"sep\">·<\u002Fspan> Geneva 1599 <span class=\"sep\">·<\u002Fspan> YLT <span class=\"sep\">·<\u002Fspan> Darby <span class=\"sep\">·<\u002Fspan> BBE\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================== SHOWCASE ==================== -->\n  <section class=\"panel showcase\" data-screen-label=\"02 Showcase\">\n    <div class=\"title\">Reading view<\u002Fdiv>\n    <span class=\"right-tag\">John 3 · KJV<\u002Fspan>\n\n    <div class=\"mini\">\n      <div class=\"title\">John 3<\u002Fdiv>\n      <div class=\"right-tag\">KJV<\u002Fdiv>\n\n      <div class=\"verse dim\"><span class=\"n\">14<\u002Fspan><span class=\"t\">And as Moses lifted up the serpent in the wilderness, even so must the Son of man be lifted up:<\u002Fspan><\u002Fdiv>\n      <div class=\"verse dim\"><span class=\"n\">15<\u002Fspan><span class=\"t\">That whosoever believeth in him should not perish, but have eternal life.<\u002Fspan><\u002Fdiv>\n      <div class=\"verse is-cursor is-active\"><span class=\"n\">16<\u002Fspan><span class=\"t\">For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.<\u002Fspan><\u002Fdiv>\n      <div class=\"verse dim\"><span class=\"n\">17<\u002Fspan><span class=\"t\">For God sent not his Son into the world to condemn the world; but that the world through him might be saved.<\u002Fspan><\u002Fdiv>\n      <div class=\"verse dim\"><span class=\"n\">18<\u002Fspan><span class=\"t\">He that believeth on him is not condemned: but he that believeth not is condemned already.<\u002Fspan><\u002Fdiv>\n\n      <div class=\"hint-row\">\n        <span><b>j k<\u002Fb> <span class=\"l\">verse<\u002Fspan><\u002Fspan>\n        <span><b>h l<\u002Fb> <span class=\"l\">chapter<\u002Fspan><\u002Fspan>\n        <span><b>/<\u002Fb> <span class=\"l\">search<\u002Fspan><\u002Fspan>\n        <span><b>:<\u002Fb> <span class=\"l\">jump to verse<\u002Fspan><\u002Fspan>\n        <span class=\"stat\">John 3:16<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================== FEATURES ==================== -->\n  <section class=\"panel\" data-screen-label=\"03 Features\">\n    <div class=\"title\">What it does<\u002Fdiv>\n    <span class=\"right-tag\">six features, all canonical<\u002Fspan>\n\n    <div class=\"features-grid\">\n      <div class=\"feat\">\n        <div class=\"num\">// 01<\u002Fdiv>\n        <h3>Smitingly fast.<\u002Fh3>\n        <p>Written in Rust. Type a phrase, get every match across every translation in under a heartbeat. No \"Did you mean…\" No \"top results from the web.\" No tracking pixels. Just verses.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"num\">// 02<\u002Fdiv>\n        <h3>Vim keybindings, all the way down.<\u002Fh3>\n        <p><code>hjkl<\u002Fcode>, <code>/<\u002Fcode>, <code>gg<\u002Fcode>, <code>n<\u002Fcode>, <code>:<\u002Fcode> — they all work. Your muscle memory transfers. Your wrists rejoice.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"num\">// 03<\u002Fdiv>\n        <h3>Translations, side by side.<\u002Fh3>\n        <p>Open KJV and WEB next to each other. Find out which translator quietly added the word \"soul.\" Settle theological debates without leaving the terminal.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"num\">// 04<\u002Fdiv>\n        <h3>Cross-references, built in.<\u002Fh3>\n        <p>Every verse links to the verses it quotes or echoes. Two keystrokes to follow Paul back to the prophets. Two more to come home.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"num\">// 05<\u002Fdiv>\n        <h3>Offline. No telemetry. No accounts.<\u002Fh3>\n        <p>Your reading stays between you and the page. The app works on a plane, in a cave, in a fallout shelter, on a network with no internet.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"num\">// 06<\u002Fdiv>\n        <h3>MCP server included.<\u002Fh3>\n        <p>Point Claude, ChatGPT, or any MCP-aware client at it. Let the model cite actual scripture instead of hallucinating it. Saves at least one heresy per session.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================== MANIFESTO ==================== -->\n  <section class=\"panel manifesto\" data-screen-label=\"04 Manifesto\">\n    <div class=\"title\">Why a TUI?<\u002Fdiv>\n    <span class=\"right-tag\">a short answer, a long lineage<\u002Fspan>\n\n    <div class=\"eyebrow\">// THE QUESTION THAT HANGS OVER EVERY TUI APP<\u002Fdiv>\n    <h2>Just scripture, in a window that looks the same in 2026 as it would have in 1992.<\u002Fh2>\n\n    <p>\n      Web Bibles want your engagement metrics. Phone apps want your attention.\n      Both want your data. A terminal app wants none of that — it just\n      wants to show you the text. Turbo Bible is fast because nothing is in\n      the way. It's distraction-free because the terminal is. And it's\n      permanent: the text doesn't update, the layout doesn't shift, the\n      company doesn't pivot. The Word was good enough for parchment; it's\n      good enough for VT100.\n    <\u002Fp>\n  <\u002Fsection>\n\n  <!-- ==================== QUICK START ==================== -->\n  <section class=\"panel\" data-screen-label=\"05 Quick start\" id=\"quickstart\">\n    <div class=\"title\">Quick start<\u002Fdiv>\n    <span class=\"right-tag\">three keystrokes from clean shell to Psalm 23<\u002Fspan>\n\n    <div class=\"section-h\" style=\"margin-bottom:22px\">\n      <h2>Three commands. No prayer required.<\u002Fh2>\n      <div class=\"rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n      <div class=\"step\">\n        <span class=\"badge\">STEP 01<\u002Fspan>\n        <h3>Install<\u002Fh3>\n        <div class=\"code\"><span class=\"sigil\">$<\u002Fspan>curl -fsSL <span class=\"arg\">turbo.bible/install.sh<\u002Fspan> | sh<\u002Fdiv>\n        <p>One line. No dependencies. No Node. No Python. No virtual environment called <code>eden<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"badge\">STEP 02<\u002Fspan>\n        <h3>Run<\u002Fh3>\n        <div class=\"code\"><span class=\"sigil\">$<\u002Fspan><span class=\"arg\">turbo<\u002Fspan><\u002Fdiv>\n        <p>Opens to Genesis 1, like a respectable book.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"badge\">STEP 03<\u002Fspan>\n        <h3>Read<\u002Fh3>\n        <div class=\"code\" style=\"background:transparent;border-color:transparent;padding-left:0\"><span style=\"color:var(--yellow);font-weight:700\">/<\u002Fspan> &nbsp;<span style=\"color:var(--yellow);font-weight:700\">gg<\u002Fspan> &nbsp;<span style=\"color:var(--yellow);font-weight:700\">?<\u002Fspan><\u002Fdiv>\n        <p>Press <code>/<\u002Fcode> to search. Press <code>gg<\u002Fcode> to jump anywhere. Press <code>?<\u002Fcode> for the keymap. Press <code>q<\u002Fcode> to quit, like Lot leaving Sodom.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================== FAQ ==================== -->\n  <section class=\"panel\" data-screen-label=\"06 FAQ\">\n    <div class=\"title\">FAQ<\u002Fdiv>\n    <span class=\"right-tag\">frequently asked<\u002Fspan>\n\n    <div class=\"faq-list\">\n      <div class=\"faq-item\">\n        <h3 class=\"faq-q\"><span class=\"marker\">Q.<\u002Fspan><span>Which translations are included?<\u002Fspan><\u002Fh3>\n        <p class=\"faq-a\">\n          Every major public-domain English translation: KJV, ASV, WEB, Geneva\n          1599, YLT, Darby, BBE, and a couple you'll only recognize if you were\n          raised on Bible-college footnotes. The full list is in the docs.\n          Modern in-copyright translations are not bundled, for the obvious\n          commercial-law reason.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <h3 class=\"faq-q\"><span class=\"marker\">Q.<\u002Fspan><span>Can I add a custom translation?<\u002Fspan><\u002Fh3>\n        <p class=\"faq-a\">\n          Yes. Any text in the bundled SQLite schema works. The docs cover the\n          schema and a converter script for the most common public formats. If\n          it's already in a common Bible-database format, it's a one-command\n          import. If it's in a binder in your closet, scan it in like a pilgrim.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <h3 class=\"faq-q\"><span class=\"marker\">Q.<\u002Fspan><span>Why a TUI? Is this a joke?<\u002Fspan><\u002Fh3>\n        <p class=\"faq-a\">\n          No. The terminal is where developers already live, terminal apps are\n          faster and more focused than web or mobile apps, and the Turbo Vision\n          aesthetic is genuinely pleasant to look at. The Bible is text. Text\n          is what terminals are for. If we wanted to put scripture in a\n          JavaScript framework, the apostles would weep.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <h3 class=\"faq-q\"><span class=\"marker\">Q.<\u002Fspan><span>What's the MCP server for?<\u002Fspan><\u002Fh3>\n        <p class=\"faq-a\">\n          <a href=\"https://modelcontextprotocol.io/\">Model Context Protocol<\u002Fa>\n          lets LLM clients call external tools. Turbo Bible's MCP server exposes\n          the bundled text so that Claude, ChatGPT, or any other MCP-aware\n          client can quote scripture accurately instead of hallucinating it.\n          Configure it once; every chat afterwards has the canonical text on\n          tap. No more sermons containing verses that don't exist.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <h3 class=\"faq-q\"><span class=\"marker\">Q.<\u002Fspan><span>Is this affiliated with any church or denomination?<\u002Fspan><\u002Fh3>\n        <p class=\"faq-a\">\n          No. Turbo Bible has no position on the Trinity, predestination,\n          infant baptism, or whether the antichrist will be a programming\n          language. It renders the text you ask for and gets out of the way.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================== FINAL CTA ==================== -->\n  <section class=\"panel final-cta\" data-screen-label=\"07 Final CTA\">\n    <div class=\"title\">About<\u002Fdiv>\n    <span class=\"right-tag\">press Esc to close<\u002Fspan>\n\n    <h2>Ready when you are.<span class=\"blink\">_<\u002Fspan><\u002Fh2>\n    <p class=\"sub\">// 224 MB on disk. seven translations, every cross-reference. tested on three monotheisms.<\u002Fp>\n\n    <div class=\"install\">\n      <div class=\"install-cmd\"><span class=\"sigil\">$<\u002Fspan>curl -fsSL <span class=\"arg\">turbo.bible/install.sh<\u002Fspan> | sh<\u002Fdiv>\n      <button class=\"install-copy\" type=\"button\" onclick=\"(()=&gt;{navigator.clipboard&amp;&amp;navigator.clipboard.writeText('curl -fsSL turbo.bible/install.sh | sh');this.textContent='COPIED';setTimeout(()=&gt;this.textContent='[ COPY ]',900)})()\">[ COPY ]<\u002Fbutton>\n    <\u002Fdiv>\n\n    <p class=\"footnote\">\n      Free. MIT-licensed. Older than computers. &nbsp;\n      <a href=\"https://github.com/USERNAME/turbo-bible\">Source on GitHub<\u002Fa>\n      <span class=\"sep\">·<\u002Fspan>\n      <a href=\"https://turbo.bible/docs\">Documentation<\u002Fa>\n    <\u002Fp>\n  <\u002Fsection>\n\n\n  <p class=\"colophon\">\n    Turbo Bible is kept by one steward. Knuth begat Ritchie; Ritchie begat Stallman; Stallman begat Torvalds; Torvalds begat Davis; Davis begat the maintainers of ratatui; and the maintainers of ratatui begat the keeper of this code. Not a theologian. The translations are public domain. The code is MIT. The text is older than computers.\n  <\u002Fp>\n\n<\u002Fmain>\n\n<!-- ==================== STATUS BAR ==================== -->\n<div class=\"statusbar\" role=\"contentinfo\">\n  <span class=\"k\"><b>Enter<\u002Fb> Open<\u002Fspan>\n  <span class=\"k\"><b>F2<\u002Fb> Goto<\u002Fspan>\n  <span class=\"k\"><b>F3<\u002Fb> Find<\u002Fspan>\n  <span class=\"k\"><b>Esc<\u002Fb> Quit<\u002Fspan>\n  <span class=\"spacer\"><\u002Fspan>\n  <span class=\"mode\">-- NORMAL --<\u002Fspan>\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
